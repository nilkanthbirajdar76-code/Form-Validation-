<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        :root {
            --bg: #ffffff;
            --card: #f9f9f9;
            --text: #252525;
            --label: #616161;
            --border: #dcdcdc;
            --accent: #4f46e5;
            --error: #d93025;
            --success: #188038;
            --input: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 18px;
            font-size: 1.5rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--label);
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input);
            font-size: 1rem;
            color: var(--text);
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px 14px;
            margin-top: 10px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        .success-message {
            margin: 12px 0 0;
            color: var(--success);
            text-align: center;
            font-size: 0.95rem;
            min-height: 18px;
        }

        .switch-text {
            margin: 16px 0 0;
            text-align: center;
            color: var(--label);
            font-size: 0.95rem;
        }

        .switch-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Login</h2>
        

        <form id="loginForm">
            <div class="input-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button type="submit">Log In</button>
            <p class="success-message" id="loginSuccess"></p>
            <!-- <p class="switch-text">Don’t have an account? <a href="formvalidate.html">Register</a></p> -->
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginSuccess = document.getElementById('loginSuccess');

        loginForm.addEventListener('submit', event => {
            event.preventDefault();
            loginSuccess.textContent = '';

            if (!loginEmail.value.trim() || !loginPassword.value.trim()) {
                alert('Please enter your email and password.');
                return;
            }

            alert('Login successful!');
            loginForm.reset();
        });
    </script>
</body>

</html>

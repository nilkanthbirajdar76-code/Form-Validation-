<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <h1>File Gallery</h1>

    <div class="grid-container">

        <!-- Image -->
        <div class="card">
            <h2>My photo</h2>
            <img src="" alt="Sample Image">
        </div>

        <!-- Video -->
        <div class="card">
            <h2>Video</h2>
            <video controls>
                <source src="" type="video/mp4">
            </video>
        </div>

        <!-- PDF -->
        <div class="card">
            <h2>PDF</h2>
            <iframe src=""></iframe>
        </div>

        <!-- Audio -->
        <div class="card">
            <h2>Song</h2>
            <audio controls>
                <source src="sample.mp3" type="audio/mpeg">
            </audio>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>

        .a {
            background-color: orange;
            height: 100px;
            width: 100px;
            position: relative;
            top: 10px;
            left: 0px;
            animation: animation1 5s infinite;
        }

        .b {
            background-color: #155df7;
            height: 100px;
            width: 100px;
            position: absolute;
            top: 10px;
            left: 0px;
            animation: animation1 5s infinite;
        }

        @keyframes animation1 {
            0% {
                top:10px;
                left: 10px;
                background-color: black;
                
                border-radius: 5px;
                
            }

            25% {
                top:10px;
                left: 100px;
                background-color: #95b710;

            }

            50% {
                top:100px;
                left: 100px;
                background-color: #1098b7;
                height: 300px;
                width: 300px;

            }

            75% {
                top:100px;
                left: 10px;
                background-color: #b71031;

            }

            100% {
                top:10px;
                left: 10px;
                background-color: black;

            }


        }

    </style>
</head>
<body>
    <div class="d-block">
<div class="a"></div>  

<div class="b">
    
</div>
    </div>
 




</body>
</html>
